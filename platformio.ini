; ESP32 Audi MMI v2 — PlatformIO project
; Two build targets:
;   env:esp32   -> real firmware (Arduino framework, ESP32 peripherals)
;   env:native  -> desktop build for the browser emulator + unit tests
;
; The domain code (src/ui, src/bt logic, src/diag parsing, src/App) is
; Arduino-free so it compiles on both. Only src/hal/esp32 touches real
; peripherals; only src/hal/native touches the desktop.

[platformio]
default_envs = native
src_dir = src

; USB/provisioning build: bakes WiFi creds (from src/Secrets.h) and writes them
; to NVS on boot. Flash this over USB. NVS survives OTA, so creds persist.
; This binary contains credentials — never publish it.
[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
  -DMMI_ESP32
  -DMMI_PROVISION
  -std=gnu++17
build_unflags = -std=gnu++11
; native-only sources are excluded from the firmware build
build_src_filter = +<*> -<hal/native/> -<main_native.cpp>
lib_ignore =

; Clean OTA/release build: no WiFi credentials baked in. Reads creds from NVS
; (set by a prior USB provisioning flash). THIS is the binary to publish.
[env:esp32-ota]
extends = env:esp32
build_unflags =
  -std=gnu++11
  -DMMI_PROVISION

[env:native]
platform = native
build_flags =
  -DMMI_NATIVE
  -std=gnu++17
  -Isrc
; esp32-only sources are excluded from the desktop build
build_src_filter = +<*> -<hal/esp32/> -<main_esp32.cpp>
; the vendored Arduino libraries must not be pulled into the native build
lib_ignore = VAGFISWriter VAGFISReader VAGRadioRemote AnalogMultiButton
; compile src/ into unit tests so domain code links (mains are guarded by PIO_UNIT_TESTING)
test_build_src = yes

[env:test]
extends = env:native
